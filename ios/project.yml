name: Even
options:
  bundleIdPrefix: com.umuryavuz
  deploymentTarget:
    iOS: "17.0"
packages:
  HouseholdCommandCenter:
    path: ..
targets:
  Even:
    type: application
    platform: iOS
    sources:
      - EvenApp
    dependencies:
      - package: HouseholdCommandCenter
        product: EvenMobile
      - target: EvenWidgetsExtension
        embed: true
    info:
      path: EvenApp/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Google in-app OAuth callback (reversed iOS client id).
        CFBundleURLTypes:
          - CFBundleURLName: google-oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.733777745150-gb5i361it6sghbc48qlgil58nsojniq7
        # HTTP allowances for the home-server API: localhost (simulator) is
        # covered by NSAllowsLocalNetworking; even-api.home (LAN devices)
        # needs an explicit exception until the API gets real TLS.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            even-api.home:
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.umuryavuz.even
        MARKETING_VERSION: 1.0.1
        CURRENT_PROJECT_VERSION: 7
        DEVELOPMENT_TEAM: C3XSV85364
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: EvenApp/Even.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: Even AppStore V2
  EvenWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - EvenWidgets
    dependencies:
      - package: HouseholdCommandCenter
        product: EvenCore
    info:
      path: EvenWidgets/Info.plist
      properties:
        CFBundleDisplayName: Even
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        UIAppFonts:
          - Newsreader.ttf
          - Newsreader-Italic.ttf
          - SourceSans3.ttf
          - SourceSans3-Italic.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.umuryavuz.even.widgets
        MARKETING_VERSION: 1.0.1
        CURRENT_PROJECT_VERSION: 7
        DEVELOPMENT_TEAM: C3XSV85364
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: EvenWidgets/EvenWidgets.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: Even Widgets AppStore

  EvenUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [EvenUITests]
    dependencies:
      - target: Even
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.umuryavuz.even.uitests
        DEVELOPMENT_TEAM: C3XSV85364
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Even
schemes:
  Even:
    build:
      targets:
        Even: all
        EvenUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [EvenUITests]
